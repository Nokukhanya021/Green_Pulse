<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Pulse — My Rewards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>



<div class="phone">
  <div class="notch"></div>
  <div class="swrap">

<div id="s12" class="screen visible">
      <div class="rw-banner">
        <svg width="80" height="32" viewBox="0 0 180 72" xmlns="http://www.w3.org/2000/svg" class="rw-logo">
          <ellipse cx="90" cy="36" rx="84" ry="32" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
          <circle cx="90" cy="4" r="3.8" fill="#3dc76b" opacity="0.9"/>
          <text x="36" y="31" font-family="DM Sans,sans-serif" font-size="14" font-weight="600" fill="#ffffff" letter-spacing="2.5">GREEN</text>
          <circle cx="90" cy="40" r="4.5" fill="#3dc76b"/><circle cx="90" cy="40" r="2" fill="#071a0e"/>
          <text x="97" y="47" font-family="DM Sans,sans-serif" font-size="14" font-weight="600" fill="#ffffff" letter-spacing="2.5">PULSE</text>
        </svg>
        <p class="rw-title">My Rewards</p>
        <p class="rw-greeting" id="rw-greeting">Hello!</p>
        <div class="rw-pts-badge">
          <span id="rw-pts-display">0</span>
          <small>Green Points</small>
        </div>
      </div>
      <div class="rw-body">
        <p class="rw-sec-title">Explore Rewards</p>
        <div class="rw-grid">
          <div class="rw-card" onclick="goTo(13)">
            <span class="rw-card-ico">🏪</span>
            <p>Marketplace</p>
            <small>Redeem points</small>
          </div>
          <div class="rw-card" onclick="goTo(14)">
            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <p>Active Missions &amp; Challenges</p>
            <small>Track progress</small>
          </div>
          <div class="rw-card" onclick="goTo(15)">
            <span class="rw-card-ico">🏆</span>
            <p>My Status</p>
            <small>View tier</small>
          </div>
          <div class="rw-card" onclick="goTo(16)">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <p>Community Leaderboard</p>
            <small>Ward rankings</small>
          </div>
        </div>
        <div class="rw-pts-bar">
          <div><p style="font-size:11px;color:#888;margin-bottom:2px;">Points Balance</p><span id="rw-pts-bar-val">0 pts</span></div>
          <small>Earn more by logging waste</small>
        </div>
      </div>
      <div class="rbnav">
        <div class="rni" onclick="goTo(6)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><p>Home</p></div>
        <div class="rni" onclick="goTo(7)"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><p>Insights</p></div>
        <div class="rfab" onclick="goTo(8)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        <div class="rni on"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5 3.19-6.98 4.8-9.14 4.8"/></svg><p>Rewards</p></div>
        <div class="rni" onclick="goTo(17)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><p>Profile</p></div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
<script>
// Re-override after script.js load (script.js defines its own goTo)
const SCREEN_FILES = {
  1: 'screen-01-splash.html',
  2: 'screen-02-login.html',
  3: 'screen-03-register.html',
  4: 'screen-04-household.html',
  5: 'screen-05-carbon-est.html',
  6: 'screen-06-home.html',
  7: 'screen-07-tips.html',
  8: 'screen-08-waste.html',
  9: 'screen-09-quantity.html',
  10: 'screen-10-calculations.html',
  11: 'screen-11-carbon-foot.html',
  12: 'screen-12-rewards.html',
  13: 'screen-13-marketplace.html',
  14: 'screen-14-missions.html',
  15: 'screen-15-status.html',
  16: 'screen-16-leaderboard.html',
  17: 'screen-17-profile.html',
  18: 'screen-18-account.html',
  19: 'screen-19-notifications.html',
  20: 'screen-20-locations.html'
};
function goTo(n) { window.location.href = SCREEN_FILES[n]; }
// Run per-screen init hooks
document.addEventListener('DOMContentLoaded', () => {
  const n = 12;
  try {
    if (n===5 && typeof updateCarbon==='function') updateCarbon();
    if ((n===6||n===7) && typeof updateGreeting==='function') { updateGreeting(); if(n===6 && typeof updateSummary==='function') updateSummary(); }
    if (n>=12 && typeof updateRewards==='function') updateRewards();
    if (n===9 && typeof prepQtyScreen==='function') prepQtyScreen();
  } catch(e) { console.warn(e); }
});
</script>
</body>
</html>
