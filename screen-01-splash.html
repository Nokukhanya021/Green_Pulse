<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Pulse — Splash</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>



<div class="phone">
  <div class="notch"></div>
  <div class="swrap">

<div id="s1" class="screen visible" style="padding:0;">
      <div onclick="goTo(2)" style="cursor:pointer;flex:1;width:100%;position:relative;overflow:hidden;background:radial-gradient(ellipse at 30% 20%, #1f6b3a 0%, #0d4a23 40%, #062815 100%);display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 400 600" preserveAspectRatio="xMidYMid meet" style="position:absolute;inset:0;width:100%;height:100%;">
          <defs>
            <radialGradient id="gpGlow" cx="30%" cy="20%" r="80%">
              <stop offset="0%" stop-color="#2a8a4a" stop-opacity="0.6"/>
              <stop offset="60%" stop-color="#0d4a23" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <rect width="400" height="600" fill="url(#gpGlow)"/>
          <g transform="translate(200 300) rotate(-30)">
            <ellipse cx="0" cy="0" rx="160" ry="55" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.95"/>
            <g fill="#ffffff">
              <polygon points="0,-58 4,-55 0,-52 -4,-55"/>
              <polygon points="0,58 4,55 0,52 -4,55"/>
              <polygon points="158,2 162,0 158,-2 154,0" transform="rotate(180)"/>
            </g>
          </g>
          <text x="200" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="34" letter-spacing="2" fill="#ffffff">GREEN PULSE</text>
        </svg>
        <div style="position:absolute;bottom:32px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.7);font-size:12px;letter-spacing:2px;font-family:Helvetica,Arial,sans-serif;">TAP TO CONTINUE</div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
<script>
// Re-override after script.js load (script.js defines its own goTo)
const SCREEN_FILES = {
  1: 'screen-01-splash.html',
  2: 'screen-02-login.html',
  3: 'screen-03-register.html',
  4: 'screen-04-household.html',
  5: 'screen-05-carbon-est.html',
  6: 'screen-06-home.html',
  7: 'screen-07-tips.html',
  8: 'screen-08-waste.html',
  9: 'screen-09-quantity.html',
  10: 'screen-10-calculations.html',
  11: 'screen-11-carbon-foot.html',
  12: 'screen-12-rewards.html',
  13: 'screen-13-marketplace.html',
  14: 'screen-14-missions.html',
  15: 'screen-15-status.html',
  16: 'screen-16-leaderboard.html',
  17: 'screen-17-profile.html',
  18: 'screen-18-account.html',
  19: 'screen-19-notifications.html',
  20: 'screen-20-locations.html'
};
function goTo(n) { window.location.href = SCREEN_FILES[n]; }
// Run per-screen init hooks
document.addEventListener('DOMContentLoaded', () => {
  const n = 1;
  try {
    if (n===5 && typeof updateCarbon==='function') updateCarbon();
    if ((n===6||n===7) && typeof updateGreeting==='function') { updateGreeting(); if(n===6 && typeof updateSummary==='function') updateSummary(); }
    if (n>=12 && typeof updateRewards==='function') updateRewards();
    if (n===9 && typeof prepQtyScreen==='function') prepQtyScreen();
  } catch(e) { console.warn(e); }
});
</script>
</body>
</html>
