<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Pulse — Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>



<div class="phone">
  <div class="notch"></div>
  <div class="swrap">

<div id="s19" class="screen visible">
      <div class="adm-hero">
        <div class="adm-back" onclick="goTo(17)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
        <h2>Notifications</h2>
      </div>
      <div class="adm-body">
        <div class="nt-card">
          <div class="nt-ico">🗑️</div>
          <div class="nt-body"><p class="nt-title">Waste Logging Reminders</p><p class="nt-desc">Remind me on collection day</p></div>
          <div class="nt-toggle" onclick="this.classList.toggle('off')"></div>
        </div>
        <div class="nt-card">
          <div class="nt-ico">📊</div>
          <div class="nt-body"><p class="nt-title">Impact Progress Reports</p><p class="nt-desc">Receive weekly summaries</p></div>
          <div class="nt-toggle" onclick="this.classList.toggle('off')"></div>
        </div>
        <div class="nt-card">
          <div class="nt-ico">🏆</div>
          <div class="nt-body"><p class="nt-title">Community Challenge Alerts</p><p class="nt-desc">New ward challenges</p></div>
          <div class="nt-toggle off" onclick="this.classList.toggle('off')"></div>
        </div>
        <div class="nt-card">
          <div class="nt-ico">🎁</div>
          <div class="nt-body"><p class="nt-title">Reward Notifications</p><p class="nt-desc">Vouchers &amp; redeems</p></div>
          <div class="nt-toggle" onclick="this.classList.toggle('off')"></div>
        </div>

        <p class="nt-times-lbl">Notification Times</p>
        <select class="nt-times-select">
          <option>7:00 AM</option>
          <option>12:00 PM</option>
          <option>6:00 PM</option>
          <option>9:00 PM</option>
        </select>
      </div>
      <div class="rbnav">
        <div class="rni" onclick="goTo(6)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><p>Home</p></div>
        <div class="rni" onclick="goTo(7)"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><p>Insights</p></div>
        <div class="rfab" onclick="goTo(8)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        <div class="rni" onclick="goTo(12)"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/></svg><p>Rewards</p></div>
        <div class="rni on" onclick="goTo(17)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><p>Profile</p></div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
<script>
// Re-override after script.js load (script.js defines its own goTo)
const SCREEN_FILES = {
  1: 'screen-01-splash.html',
  2: 'screen-02-login.html',
  3: 'screen-03-register.html',
  4: 'screen-04-household.html',
  5: 'screen-05-carbon-est.html',
  6: 'screen-06-home.html',
  7: 'screen-07-tips.html',
  8: 'screen-08-waste.html',
  9: 'screen-09-quantity.html',
  10: 'screen-10-calculations.html',
  11: 'screen-11-carbon-foot.html',
  12: 'screen-12-rewards.html',
  13: 'screen-13-marketplace.html',
  14: 'screen-14-missions.html',
  15: 'screen-15-status.html',
  16: 'screen-16-leaderboard.html',
  17: 'screen-17-profile.html',
  18: 'screen-18-account.html',
  19: 'screen-19-notifications.html',
  20: 'screen-20-locations.html'
};
function goTo(n) { window.location.href = SCREEN_FILES[n]; }
// Run per-screen init hooks
document.addEventListener('DOMContentLoaded', () => {
  const n = 19;
  try {
    if (n===5 && typeof updateCarbon==='function') updateCarbon();
    if ((n===6||n===7) && typeof updateGreeting==='function') { updateGreeting(); if(n===6 && typeof updateSummary==='function') updateSummary(); }
    if (n>=12 && typeof updateRewards==='function') updateRewards();
    if (n===9 && typeof prepQtyScreen==='function') prepQtyScreen();
  } catch(e) { console.warn(e); }
});
</script>
</body>
</html>
