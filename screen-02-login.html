<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Pulse — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>



<div class="phone">
  <div class="notch"></div>
  <div class="swrap">

<div id="s2" class="screen visible" style="padding:0;background:#ffffff;">
      <!-- Green hero with orbit/wordmark -->
      <div style="width:100%;height:38%;position:relative;overflow:hidden;border-bottom-left-radius:18px;border-bottom-right-radius:18px;background:radial-gradient(ellipse at 30% 20%, #1f6b3a 0%, #0d4a23 55%, #062815 100%);display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 400 240" preserveAspectRatio="xMidYMid meet" style="position:absolute;inset:0;width:100%;height:100%;">
          <g transform="translate(200 120) rotate(-30)">
            <ellipse cx="0" cy="0" rx="120" ry="40" fill="none" stroke="#ffffff" stroke-width="1.1" opacity="0.95"/>
            <g fill="#ffffff">
              <polygon points="0,-42 3,-40 0,-38 -3,-40"/>
              <polygon points="0,42 3,40 0,38 -3,40"/>
            </g>
          </g>
          <text x="200" y="130" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="22" letter-spacing="2" fill="#ffffff">GREEN PULSE</text>
        </svg>
      </div>

      <!-- White card content -->
      <div style="flex:1;width:100%;padding:18px 22px 16px;display:flex;flex-direction:column;font-family:Helvetica,Arial,sans-serif;color:#0d2818;">
        <h2 style="margin:6px 0 4px;font-size:18px;font-weight:800;text-align:center;">Welcome to Green Pulse</h2>
        <p style="margin:0 0 14px;font-size:11px;text-align:center;color:#4a4a4a;">Your journey to sustainable waste starts here</p>

        <input type="text" placeholder="Username/Email Address" style="width:100%;padding:11px 16px;border:1px solid #d4d4d4;border-radius:24px;font-size:12px;margin-bottom:8px;outline:none;background:#fff;"/>
        <input type="password" placeholder="Password" style="width:100%;padding:11px 16px;border:1px solid #d4d4d4;border-radius:24px;font-size:12px;margin-bottom:10px;outline:none;background:#fff;"/>

        <button onclick="doLogin()" style="width:100%;padding:11px;border:none;border-radius:24px;background:#1f8a3a;color:#fff;font-weight:800;font-size:13px;letter-spacing:1px;cursor:pointer;margin-bottom:8px;">LOGIN</button>
        <button onclick="goTo(3)" style="width:100%;padding:10px;border:1.5px solid #1f8a3a;border-radius:24px;background:#fff;color:#1f8a3a;font-weight:700;font-size:12px;letter-spacing:0.5px;cursor:pointer;margin-bottom:12px;">CREATE ACCOUNT</button>

        <div style="display:flex;align-items:center;gap:8px;margin:2px 0 10px;">
          <div style="flex:1;height:1px;background:#1f8a3a;opacity:0.5;"></div>
          <span style="font-size:10px;color:#4a4a4a;">Or sign up with</span>
          <div style="flex:1;height:1px;background:#1f8a3a;opacity:0.5;"></div>
        </div>

        <div style="display:flex;justify-content:center;gap:18px;margin-bottom:12px;">
          <button onclick="doLogin()" aria-label="Google" style="width:38px;height:38px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          </button>
          <button onclick="doLogin()" aria-label="Apple" style="width:38px;height:38px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          </button>
        </div>

        <p style="margin:auto 0 0;text-align:center;font-size:10px;color:#4a4a4a;">View our <a href="#" style="color:#1f8a3a;text-decoration:underline;font-weight:600;">POPIA Privacy Policy</a></p>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
<script>
// Re-override after script.js load (script.js defines its own goTo)
const SCREEN_FILES = {
  1: 'screen-01-splash.html',
  2: 'screen-02-login.html',
  3: 'screen-03-register.html',
  4: 'screen-04-household.html',
  5: 'screen-05-carbon-est.html',
  6: 'screen-06-home.html',
  7: 'screen-07-tips.html',
  8: 'screen-08-waste.html',
  9: 'screen-09-quantity.html',
  10: 'screen-10-calculations.html',
  11: 'screen-11-carbon-foot.html',
  12: 'screen-12-rewards.html',
  13: 'screen-13-marketplace.html',
  14: 'screen-14-missions.html',
  15: 'screen-15-status.html',
  16: 'screen-16-leaderboard.html',
  17: 'screen-17-profile.html',
  18: 'screen-18-account.html',
  19: 'screen-19-notifications.html',
  20: 'screen-20-locations.html'
};
function goTo(n) { window.location.href = SCREEN_FILES[n]; }
// Run per-screen init hooks
document.addEventListener('DOMContentLoaded', () => {
  const n = 2;
  try {
    if (n===5 && typeof updateCarbon==='function') updateCarbon();
    if ((n===6||n===7) && typeof updateGreeting==='function') { updateGreeting(); if(n===6 && typeof updateSummary==='function') updateSummary(); }
    if (n>=12 && typeof updateRewards==='function') updateRewards();
    if (n===9 && typeof prepQtyScreen==='function') prepQtyScreen();
  } catch(e) { console.warn(e); }
});
</script>
</body>
</html>
